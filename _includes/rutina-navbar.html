<nav class="navbar">
  <div class="navbar-inner">
    <a href="{{ '/rutina/' | relative_url }}" class="navbar-brand">GymLog</a>
    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>
  <ul class="nav-links">
    {% for routine in site.routines %}
      <li>
        <a href="{{ routine.url | relative_url }}"
           class="nav-link {% if page.slug == routine.slug %}active{% endif %}"
           data-i18n-en="{{ routine.name.en | default: routine.name }}"
           data-i18n-es="{{ routine.name.es | default: routine.name }}">
          {{ routine.name.en | default: routine.name }}
        </a>
      </li>
    {% endfor %}
    <li class="nav-separator"></li>
    <li>
      <button class="nav-link lang-switch" data-i18n="lang_label">ES</button>
    </li>
    <li class="nav-separator"></li>
    <li>
      <a href="{{ '/' | relative_url }}" class="nav-link">&larr; Home</a>
    </li>
  </ul>
</nav>

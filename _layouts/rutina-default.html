<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% if page.name.en %}{{ page.name.en }} — {% elsif page.name %}{{ page.name }} — {% endif %}GymLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/rutina.css' | relative_url }}">
  <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
  <meta name="theme-color" content="#e8dcc8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GymLog">
  <link rel="apple-touch-icon" href="{{ '/assets/icons/icon-192.svg' | relative_url }}">
  <script id="i18n-data" type="application/json">{"en":{{ site.data.i18n.en | jsonify }},"es":{{ site.data.i18n.es | jsonify }}}</script>
</head>
<body>
  {% include rutina-navbar.html %}
  {% if page.layout == 'rutina-routine' %}
    {% include rutina-week-bar.html %}
  {% endif %}
  <main class="main-content">
    {{ content }}
  </main>
  <script src="{{ '/assets/js/rutina-app.js' | relative_url }}"></script>
  <script>
    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
    document.documentElement.classList.toggle('standalone', isStandalone);
  </script>
</body>
</html>
